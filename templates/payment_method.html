<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tỷ trọng phương thức thanh toán</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}" />
  </head>
  <body>
    <main class="dashboard-shell">
      <header class="header glass">
        <div>
          <h1>Tỷ trọng phương thức thanh toán</h1>
          <p>Khám phá cơ cấu thanh toán theo từng phương thức.</p>
        </div>
        <div class="filters">
          <select id="locationFilter"><option value="">Tất cả thành phố</option></select>
          <select id="paymentFilter"><option value="">Tất cả phương thức</option></select>
        </div>
      </header>

      <nav class="page-nav">
        <a href="/">Trang chủ</a>
        <a href="/charts/category-spend">Danh mục ngành hàng</a>
        <a href="/charts/trend">Xu hướng thời gian</a>
        <a href="/charts/location-sales">Doanh số địa phương</a>
      </nav>

      <p id="dashboardMessage" class="dashboard-message" role="status" aria-live="polite"></p>

      <section class="single-chart-grid">
        <article class="chart-card single-chart-card glass">
          <h3>Tỷ trọng phương thức thanh toán</h3>
          <canvas id="chartCanvas"></canvas>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="{{ url_for('static', filename='js/pages/payment-method.js') }}"></script>
  </body>
</html>
