<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=3">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-panel">
            <div class="brand-block">
                <p class="eyebrow">Fraud Detection</p>
                <h1>Đăng nhập</h1>
            </div>
            <form id="loginForm" class="form-stack">
                <label>
                    Email
                    <input name="email" type="email" autocomplete="email" required>
                </label>
                <label>
                    Mật khẩu
                    <input name="password" type="password" autocomplete="current-password" required>
                </label>
                <p id="formMessage" class="message" aria-live="polite"></p>
                <button type="submit">Đăng nhập</button>
            </form>
            <p class="switch-link">Chưa có tài khoản? <a href="/register">Đăng ký</a></p>
        </section>
    </main>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
